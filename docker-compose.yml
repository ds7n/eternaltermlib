  #   build:
  #     context: .
  #     dockerfile: Dockerfile.etserver
  #   image: eternaltermlib-etserver
  #   healthcheck:
  #     test: ["CMD", "nc", "-z", "127.0.0.1", "2022"]
  #     interval: 1s
  #     timeout: 3s
